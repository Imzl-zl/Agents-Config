# --- 模型部分 ---
model_provider = "Custom"
model = "gpt-5.4(xhigh)"                 # 或升级到你最新的模型
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"

disable_response_storage = true     # 保留，隐私好
preferred_auth_method = "apikey"
personality = "pragmatic"
service_tier = "fast"

# --- 核心功能开关（WSL 下推荐组合） ---
[features]
multi_agent = true
unified_exec = true                 # 保留，PTY 统一执行器在 Linux 上很稳
shell_snapshot = true               # 强烈推荐，加速重复命令
steer = true                        # 保留，纠错机制好用
# fast_mode = true                    # 可选，如果你追求速度

[agents]
max_threads = 8                     # WSL 下可适当提高到 8–12，如果内存够
max_depth = 1

# --- 沙箱与权限（WSL 下更推荐） ---
[profiles.auto-workspace]
approval_policy = "on-failure"      # 建议从 "never" 改成 "on-failure"（更安全，Linux 沙箱强）
sandbox_mode = "danger-full-access" # 或 "workspace-write"，WSL Landlock/seccomp 很可靠，可放宽

default_profile = "auto-workspace"  # 保留

# --- 自定义模型提供者（不变） ---
[model_providers.Custom]
base_url = "http://your url/v1"
name = "Custom"
requires_openai_auth = true
wire_api = "responses"

# --- TUI 与通知（WSL 下建议简化） ---
[tui]
notifications = false               # 或 true，但 WSL 终端通知常失效，建议关掉或用 bel
notification_method = "bel"         # bel 是铃声，更可靠；auto 在 WSL 常出问题

# 其他可选加的（提升体验）
[linux]
# network_access = true             # 如果 agent 需要 MCP SSE、外部 API 或下载依赖，打开
# sandbox_workspace_write = {       # 如果 sandbox_mode = "workspace-write"，可细控
#   network_access = true
#   allowed_paths = ["./", "../sibling-project"]
# }

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.open-websearch]
command = "npx"
args = ["-y", "open-websearch@latest"]
startup_timeout_sec = 60.0

[mcp_servers.open-websearch.env]
ALLOWED_SEARCH_ENGINES = "duckduckgo,bing,brave"
DEFAULT_SEARCH_ENGINE = "duckduckgo"
MODE = "stdio"

[mcp_servers.mcp-deepwiki]
command = "npx"
args = ["-y", "mcp-deepwiki@latest"]
startup_timeout_sec = 60.0

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
startup_timeout_sec = 60.0

[mcp_servers.augment-context-engine]
command = "auggie"
args = ["--mcp", "--mcp-auto-workspace"]
startup_timeout_sec = 60.0

[mcp_servers.augment-context-engine.env]
AUGMENT_API_TOKEN = "Your key"
AUGMENT_API_URL = "https://acemcp.heroman.wtf/relay/"

[mcp_servers.serena]
command = "uvx"
args = [
  "--from", "git+https://github.com/oraios/serena",
  "serena", "start-mcp-server",
  "--context", "codex",
  "--enable-web-dashboard", "false",
  "--log-level", "DEBUG"
]
startup_timeout_sec = 300.0